name: Deploy Backend (Cloud Run)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  GCP_PROJECT: jetaime-dev
  GCP_REGION: asia-northeast3
  SERVICE_NAME: nexus-core
  ARTIFACT_REGISTRY: nexus-repo
  BACKEND_IMAGE: nexus-core

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # WIF OIDC 토큰 발급용

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # ── GCP 인증 (WIF — 키 파일 없음) ────────────────────────────────────
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      # ── Docker → Artifact Registry 인증 ────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── 이미지 빌드 + GAR push (linux/amd64 명시) ───────────────────────
      - name: Build and push image to GAR
        working-directory: backend
        run: |
          set -euo pipefail
          IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.BACKEND_IMAGE }}"
          SHA_TAG="$IMAGE_BASE:${{ github.sha }}"
          LATEST_TAG="$IMAGE_BASE:latest"

          docker buildx build \
            --platform linux/amd64 \
            --tag "$SHA_TAG" \
            --tag "$LATEST_TAG" \
            --push \
            .

          echo "IMAGE_URI=$SHA_TAG" >> "$GITHUB_ENV"

      # ── 기존 Secret Manager reference 제거 (env 타입 충돌 방지) ────────
      # deploy-cloudrun 액션이 env_vars + 기존 secrets 동시 적용 시 타입 충돌 발생.
      # kairos/truewords 사고 사례 참조 — 별도 호출로 분리해야 안전.
      - name: Clear existing secret references
        continue-on-error: true
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --clear-secrets

      # ── Cloud Run 배포 ──────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522  # v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE_URI }}
          # --cpu-boost: cold start 시 CPU 2x 부스트
          # --no-cpu-throttling: 응답 외 시간에도 CPU 유지 — startup probe 안정 통과
          # Startup probe: /health 200 응답 후 트래픽 라우팅.
          # 총 budget: 5s + 10s × 30 = 305s.
          flags: >-
            --allow-unauthenticated --port=8080 --memory=1Gi
            --min-instances=0 --max-instances=3
            --cpu-boost --no-cpu-throttling
            --startup-probe-http-get-path=/health
            --startup-probe-initial-delay=5
            --startup-probe-period=10
            --startup-probe-timeout=5
            --startup-probe-failure-threshold=30
          env_vars: |
            DEBUG=false
            STORAGE_PROVIDER=r2
            CORS_ORIGINS=https://nexus-core-admin.vercel.app,https://nexus-core-six.vercel.app,http://localhost:3000,http://localhost:3001
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            AUTH_JWKS_URL=${{ secrets.AUTH_JWKS_URL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            R2_ENDPOINT_URL=${{ secrets.R2_ENDPOINT_URL }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
            R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}

      # ── Smoke test ─────────────────────────────────────────────────────
      - name: Smoke test
        run: |
          set -euo pipefail
          URL="${{ steps.deploy.outputs.url }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ $URL/health → 200 (attempt $i)"
              exit 0
            fi
            echo "⏳ attempt $i: got $STATUS, retrying in 10s"
            sleep 10
          done
          echo "❌ Smoke test failed after 5 attempts"
          exit 1

      - name: Show output
        run: echo "서버 배포 완료! 접속 주소 -> ${{ steps.deploy.outputs.url }}"
