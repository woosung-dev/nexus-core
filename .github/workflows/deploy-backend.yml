name: Deploy Backend (Cloud Run)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

env:
  GCP_PROJECT: jetaime-dev
  GCP_REGION: asia-northeast3
  SERVICE_NAME: nexus-core
  ARTIFACT_REGISTRY: nexus-repo
  BACKEND_IMAGE: nexus-core

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # WIF OIDC 토큰 발급용

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # ── GCP 인증 (WIF — 키 파일 없음) ────────────────────────────────────
      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed  # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}

      # ── Docker → Artifact Registry 인증 ────────────────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── 이미지 빌드 + GAR push (linux/amd64 명시) ───────────────────────
      - name: Build and push image to GAR
        working-directory: backend
        run: |
          set -euo pipefail
          IMAGE_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REGISTRY }}/${{ env.BACKEND_IMAGE }}"
          SHA_TAG="$IMAGE_BASE:${{ github.sha }}"
          LATEST_TAG="$IMAGE_BASE:latest"

          docker buildx build \
            --platform linux/amd64 \
            --tag "$SHA_TAG" \
            --tag "$LATEST_TAG" \
            --push \
            .

          echo "IMAGE_URI=$SHA_TAG" >> "$GITHUB_ENV"

      # ── DB 마이그레이션 실행 (Cloud Run 배포 전) ────────────────────────
      # 방금 빌드된 이미지에 alembic 과 최신 revision 파일이 모두 들어 있으므로 그대로 재사용.
      # 마이그레이션이 먼저 schema 를 맞춰주고, 실패 시 아래 Deploy step 자체가 실행되지 않음 →
      # 새 코드가 구 schema 위에 올라가는 사고를 차단한다.
      # alembic/env.py 가 app.core.config.get_settings() 를 호출하므로 Settings 의
      # required 필드(GEMINI_API_KEY/AUTH_JWKS_URL)도 함께 주입해야 ValidationError 방지.
      - name: Run Alembic migrations
        run: |
          set -euo pipefail
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
            -e AUTH_JWKS_URL="${{ secrets.AUTH_JWKS_URL }}" \
            "${{ env.IMAGE_URI }}" \
            alembic upgrade head

      # ── 기존 Secret Manager reference 제거 (env 타입 충돌 방지) ────────
      # deploy-cloudrun 액션이 env_vars + 기존 secrets 동시 적용 시 타입 충돌 발생.
      # kairos/truewords 사고 사례 참조 — 별도 호출로 분리해야 안전.
      - name: Clear existing secret references
        continue-on-error: true
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --clear-secrets

      # ── Cloud Run 배포 ──────────────────────────────────────────────────
      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@251330ba9a8a34bfbc1622895f42e1d53fd14522  # v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          image: ${{ env.IMAGE_URI }}
          # --cpu-boost: cold start 시 CPU 2x 부스트
          # --no-cpu-throttling: 응답 외 시간에도 CPU 유지 — startup probe 안정 통과
          # Startup probe: /health 200 응답 후 트래픽 라우팅. budget = 5 + 10×30 = 305s.
          # 최신 gcloud는 개별 --startup-probe-* 플래그 대신 단일 --startup-probe=KEY=VAL,... 형식.
          flags: >-
            --allow-unauthenticated --port=8080 --memory=1Gi
            --min-instances=0 --max-instances=3
            --cpu-boost --no-cpu-throttling
            --startup-probe=httpGet.path=/health,initialDelaySeconds=5,periodSeconds=10,timeoutSeconds=5,failureThreshold=30
          # NOTE: CORS_ORIGINS는 콤마가 포함되어 deploy-cloudrun 액션의 env_vars 파서가
          # 값을 split해버린다 (사고 사례 확인). 별도 step에서 ^|^ delimiter로 주입.
          env_vars: |
            DEBUG=false
            STORAGE_PROVIDER=r2
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            AUTH_JWKS_URL=${{ secrets.AUTH_JWKS_URL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            R2_ENDPOINT_URL=${{ secrets.R2_ENDPOINT_URL }}
            R2_ACCESS_KEY_ID=${{ secrets.R2_ACCESS_KEY_ID }}
            R2_SECRET_ACCESS_KEY=${{ secrets.R2_SECRET_ACCESS_KEY }}
            R2_BUCKET_NAME=${{ secrets.R2_BUCKET_NAME }}
            R2_PUBLIC_URL=${{ secrets.R2_PUBLIC_URL }}

      # ── CORS_ORIGINS 별도 주입 (^|^ delimiter로 콤마 split 회피) ────────
      - name: Set CORS_ORIGINS
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --update-env-vars='^|^CORS_ORIGINS=https://nexus-core-admin.vercel.app,https://nexus-core-sable.vercel.app,http://localhost:3000,http://localhost:3001'

      # ── Smoke test ─────────────────────────────────────────────────────
      - name: Smoke test
        run: |
          set -euo pipefail
          URL="${{ steps.deploy.outputs.url }}"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${URL}/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ $URL/health → 200 (attempt $i)"
              exit 0
            fi
            echo "⏳ attempt $i: got $STATUS, retrying in 10s"
            sleep 10
          done
          echo "❌ Smoke test failed after 5 attempts"
          exit 1

      - name: Show output
        run: echo "서버 배포 완료! 접속 주소 -> ${{ steps.deploy.outputs.url }}"
